<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ZZFX - Space Shooter Sounds</title>
<style>
  body {
    font-family: system-ui, sans-serif;
    background: #111;
    color: #eee;
    padding: 40px;
    text-align: center;
  }
  h1 { color: #0af; }
  button {
    background: #222;
    color: #0af;
    border: 2px solid #0af;
    padding: 18px 35px;
    margin: 12px;
    font-size: 20px;
    cursor: pointer;
    border-radius: 10px;
  }
  button:hover {
    background: #0af;
    color: #111;
  }
  .section {
    margin-top: 40px;
  }
  .section h3 {
    color: #888;
    margin-bottom: 10px;
  }
</style>
</head>
<body>

<h1>🚀 ZZFX - Space Shooter Sound Test</h1>

<div class="section">
  <h3>Weapon Sounds</h3>
  <button onclick="playLaser()">Primary Laser</button>
  <button onclick="playMissile()">Missile</button>
  <button onclick="playBomb()">Bomb Explosion</button>
</div>

<div class="section">
  <h3>Damage &amp; Destruction</h3>
  <button onclick="playDamage()">Take Damage</button>
  <button onclick="playSmallEnemyDestroyed()">Small Enemy Destroyed</button>
  <button onclick="playEnemyDestroyed()">Enemy Destroyed</button>
  <button onclick="playBigEnemyDestroyed()">Big Enemy Destroyed</button>
</div>

<div class="section">
  <h3>Other</h3>
  <button onclick="playPowerup()">Powerup</button>
</div>

<script>
// ==================== ZZFX SETUP ====================
let zzfxV = 0.9;
let zzfxX = null;

function getAudioContext() {
  if (!zzfxX) {
    zzfxX = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (zzfxX.state === 'suspended') {
    zzfxX.resume();
  }
  return zzfxX;
}

let zzfx = (p=1,k=.05,b=220,e=0,r=0,t=.1,q=0,D=1,u=0,y=0,v=0,z=0,l=0,E=0,A=0,F=0,c=0,w=1,m=0,B=0,N=0)=>{let 
M=Math,d=2*M.PI,R=44100,G=u*=500*d/R/R,C=b*=(1-k+2*k*M.random(k=[]))*d/R,g=0,H=0,a=0,n=1,I=0,J=0,f=0,h=N<0?-1:1,x=d*h*N*2/R,L=M.cos(x),Z=M.sin,K=Z(x)/4,O=1+K,X=-2*L/O,Y=(1-K)/O,P=(1+h*L)/2/O,Q=-(h+L)/O,S=P,T=0,U=0,V=0,W=0;e=R*e+9;m*=R;r*=R;t*=R;c*=R;y*=500*d/R**3;A*=d/R;v*=d/R;z*=R;l=R*l|0;p*=zzfxV;for(h=e+m+r+t+c|0;a<h;k[a++]=f*p)++J%(100*F|0)||(f=q?1<q?2<q?3<q?4<q?(g/d%1<D/2)*2-1:Z(g**3):M.max(M.min(M.tan(g),1),-1):1-(2*g/d%2+2)%2:1-4*M.abs(M.round(g/d)-g/d):Z(g),f=(l?1-B+B*Z(d*a/l):1)*(4<q?f:(f<0?-1:1)*M.abs(f)**D)*(a<e?a/e:a<e+m?1-(a-e)/m*(1-w):a<e+m+r?w:a<h-c?(h-a-c)/t*w:0),f=c?f/2+(c>a?0:(a<h-c?1:(h-a)/c)*k[a-c|0]/2/p):f,N?f=W=S*T+Q*(T=U)+P*(U=f)-Y*V-X*(V=W):0),x=(b+=u+=y)*M.cos(A*H++),g+=x+x*E*Z(a**5),n&&++n>z&&(b+=v,C+=v,n=0),!l||++I%l||(b=C,u=G,n=n||1);X=zzfxX,p=X.createBuffer(1,h,R);p.getChannelData(0).set(k);b=X.createBufferSource();b.buffer=p;b.connect(X.destination);b.start()};

let originalZzfx = zzfx;
zzfx = (...args) => {
  getAudioContext();
  return originalZzfx(...args);
};
// ============================================================

// ==================== WEAPON SOUNDS ====================

// Primary Laser
function playLaser() {
  zzfx(.7,.05,459,.01,.07,.07,5,.5552178921364611,5,36,0,0,0,0,5.9,.5,0,.87,.05,0,-1436);
}

// Missile
function playMissile() {
  zzfx(1.7,.05,965,.36,0,.24,1,1.6,-76,-1,0,0,.02,0,49,0,.05,.96,.01,.16,0);
}

// Bomb Explosion
function playBomb() {
  zzfx(4.6,.05,75,.07,.17,.27,0,3.4,1,9,0,0,0,.2,17,.9,.38,.31,.14,0,-1853);
}

// ==================== DAMAGE & DESTRUCTION ====================

// Take Damage (metallic crash)
function playDamage() {
  zzfx(1,.05,15,.2,0,.01,3,1.9,0,0,0,0,0,0,0,0,0,.74,.16,0,0);
}

// Small enemy destroyed
function playSmallEnemyDestroyed() {
  zzfx(1.1,.05,208,.03,.09,.04,4,3.7,-1,0,0,0,0,1.9,0,.5,0,.85,.01,0,-2374);
}

// Normal enemy destroyed
function playEnemyDestroyed() {
  zzfx(2.5,.05,355,.02,.05,.11,1,2,9,0,0,0,0,1.9,0,.3,.19,.61,.05,0,113);
}

// Big enemy destroyed
function playBigEnemyDestroyed() {
  zzfx(2,.05,71,.1,.06,.34,5,1.1,-1,-4,0,0,.07,2,0,.8,.4,.45,.12,0,0);
}

// ==================== OTHER ====================

// Powerup
function playPowerup() {
  zzfx(.5,.05,100,.21,.32,.21,5,.969288914337749,0,8,171,.26,0,0,4.8,0,0,.58,0,0,-1498);
}
</script>

</body>
</html>
