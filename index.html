<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>xJetVectra</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="xJetVectra">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
   <link rel="apple-touch-icon" href="icon-192.png">
</head>

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./sw.js", {
        scope: "./"
      });
    });
  }
</script>
<body>
  <button id="fullscreenBtn" title="Fullscreen">⛶</button>

  <canvas id="game"></canvas>

  <div id="rotateDeviceOverlay" aria-hidden="true">
    <div class="rotateCard">
      <div class="rotateIcon">↻</div>
      <div class="rotateTitle">Rotate to Landscape</div>
      <div class="rotateText">xJetVectra is designed for horizontal play.</div>
    </div>
  </div>

  <div id="cameraControls">
    <label>
      Zoom
      <input id="cameraZoom" type="range" min="-900" max="-120" value="-520">
    </label>

    <label>
      Camera Y
      <input id="cameraHeight" type="range" min="-120" max="120" value="120">
    </label>

    <div id="weaponSelect">
      <button id="selectPrimaryBtn" class="weaponSelectButton primaryWeapon" title="Primary">P</button>
      <button id="selectMissileBtn" class="weaponSelectButton missileWeapon" title="Missile">M</button>
      <button id="selectBombBtn" class="weaponSelectButton bombWeapon" title="Bomb">B</button>
    </div>
  </div>

  <div id="controls">
    <button id="leftBtn" class="control left">L</button>
    <button id="leftFireBtn" class="miniFire leftMini">●</button>

    <button id="weaponCycleBtn" class="cycle">PRIMARY</button>

    <button id="rightFireBtn" class="miniFire rightMini">●</button>
    <button id="rightBtn" class="control right">R</button>
  </div>
  <script src="js/state.js"></script>
  <script src="js/core.js"></script>
  <script src="js/sound.js"></script>
  <script src="js/controls.js"></script>
  <script src="js/camera.js"></script>
  <script src="js/ship.js"></script>
  <script src="js/weapons.js"></script>
  <script src="js/enemies.js"></script>
  <script src="js/level.js"></script>
  <script src="js/effects.js"></script>
  <script src="js/graphics.js"></script>
  <script src="js/loop.js"></script>
  <script src="js/boot.js"></script>
</body>
</html>
